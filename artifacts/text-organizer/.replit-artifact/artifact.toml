kind = "web"
previewPath = "/"
title = "Text Organizer"
version = "1.0.0"
id = "artifacts/text-organizer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24685
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/text-organizer run dev"

[services.env]
PORT = "24685"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/text-organizer", "run", "build"]
publicDir = "artifacts/text-organizer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
